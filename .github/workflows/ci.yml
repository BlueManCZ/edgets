name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  pkgcheck:
    name: pkgcheck scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pkgcheck
        run: pip install pkgcheck

      - name: Fetch Gentoo tree
        run: |
          wget -q http://distfiles.gentoo.org/snapshots/gentoo-latest.tar.xz -O /tmp/gentoo.tar.xz
          tar xf /tmp/gentoo.tar.xz -C /tmp/
          mv /tmp/gentoo-* /tmp/gentoo

      - name: Configure repos
        run: |
          sudo mkdir -p /etc/portage
          cat <<'EOF' | sudo tee /etc/portage/repos.conf > /dev/null
          [DEFAULT]
          main-repo = gentoo

          [gentoo]
          location = /tmp/gentoo

          [edgets]
          location = ${{ github.workspace }}
          EOF

      - name: Run pkgcheck
        run: pkgcheck scan --repo edgets

  version-limit:
    name: Max 4 versions per package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version limit
        run: |
          status=0
          for pkg_dir in */*/; do
            # Skip non-package directories
            [[ "$pkg_dir" == metadata/* ]] && continue
            [[ "$pkg_dir" == profiles/* ]] && continue
            [[ "$pkg_dir" == eclass/* ]]   && continue
            [[ "$pkg_dir" == .github/* ]]  && continue

            count=$(find "$pkg_dir" -maxdepth 1 -name '*.ebuild' | wc -l)
            if [ "$count" -gt 4 ]; then
              echo "::error file=${pkg_dir%/}::${pkg_dir%/} has $count versions (max 4)"
              status=1
            fi
          done
          exit "$status"

  manifests:
    name: Manifest consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Every package with ebuilds has a Manifest
        run: |
          status=0
          for pkg_dir in */*/; do
            [[ "$pkg_dir" == metadata/* ]] && continue
            [[ "$pkg_dir" == profiles/* ]] && continue
            [[ "$pkg_dir" == eclass/* ]]   && continue
            [[ "$pkg_dir" == .github/* ]]  && continue

            ebuild_count=$(find "$pkg_dir" -maxdepth 1 -name '*.ebuild' | wc -l)
            if [ "$ebuild_count" -gt 0 ] && [ ! -f "${pkg_dir}Manifest" ]; then
              echo "::error file=${pkg_dir%/}::${pkg_dir%/} has ebuilds but no Manifest"
              status=1
            fi
          done
          exit "$status"

      - name: Every ebuild is listed in its Manifest
        run: |
          status=0
          for pkg_dir in */*/; do
            [[ "$pkg_dir" == metadata/* ]] && continue
            [[ "$pkg_dir" == profiles/* ]] && continue
            [[ "$pkg_dir" == eclass/* ]]   && continue
            [[ "$pkg_dir" == .github/* ]]  && continue

            [ -f "${pkg_dir}Manifest" ] || continue

            for ebuild in "$pkg_dir"*.ebuild; do
              [ -f "$ebuild" ] || continue
              basename=$(basename "$ebuild")
              if ! grep -q "$basename" "${pkg_dir}Manifest"; then
                echo "::error file=${ebuild}::${ebuild} not found in Manifest"
                status=1
              fi
            done
          done
          exit "$status"
